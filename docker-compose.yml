services:
  timerhook:
    build: .
    ports:
      - "8080:8080"
    environment:
      - TZ=UTC
      - STATE_PATH=/data/state.json
    volumes:
      - ./data:/data
    healthcheck:
      test: ["CMD", "/webhooktimer", "healthcheck"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
